appId: com.nudgepeek.app
productName: NudgePeek
copyright: Personal Use

directories:
  buildResources: resources
  output: release

files:
  - out/**
  - package.json
  - '!**/*.map'

# Copy the tray icon into the packaged app so the main process can load
# it via `process.resourcesPath` after install.
extraResources:
  - from: resources/icon.png
    to: icon.png

extraMetadata:
  main: out/main/index.js

publish:
  provider: github
  owner: Seanji2002
  repo: nudgepeek
  releaseType: draft
  vPrefixedTagName: true

mac:
  icon: resources/icon.png
  category: public.app-category.social-networking
  # Ad-hoc signing (identity '-') — no Apple Developer ID needed. The build
  # is unsigned in the "not from a known developer" sense, but Gatekeeper
  # sees a valid signature and shows the normal "Open Anyway" button in
  # System Settings → Privacy & Security instead of the harsher "App is
  # damaged" dialog that completely unsigned apps trigger on macOS 14+.
  identity: '-'
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    # The zip target is required for `electron-updater` / Squirrel.Mac to
    # apply auto-updates on macOS — Squirrel swaps the running .app from a
    # zip, never from the DMG. Without this entry `latest-mac.yml` only
    # references the DMG and `downloadUpdate()` errors with
    # "ZIP file not provided".
    - target: zip
      arch:
        - x64
        - arm64

win:
  icon: resources/icon.png
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: true
  perMachine: false

linux:
  icon: resources/icon.png
  target: AppImage
