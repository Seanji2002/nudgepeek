appId: com.nudgepeek.app
productName: NudgePeek
copyright: Personal Use

directories:
  buildResources: resources
  output: release

files:
  - out/**
  - package.json
  - '!**/*.map'

extraMetadata:
  main: out/main/index.js

publish:
  provider: github
  owner: Seanji2002
  repo: nudgepeek
  releaseType: draft
  vPrefixedTagName: true

mac:
  icon: resources/icon.png
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.social-networking

win:
  icon: resources/icon.png
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: true
  perMachine: false

linux:
  icon: resources/icon.png
  target: AppImage
